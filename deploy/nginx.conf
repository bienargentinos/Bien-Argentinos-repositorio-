server {
    listen 80;
    server_name TU_DOMINIO_O_IP;       # ← reemplazar con tu dominio o IP del VPS

    # Frontend (HTML estático)
    location / {
        root /var/www/bienargentinos/frontend;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Backend Flask via Gunicorn
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # PDFs generados
    location /pdf/ {
        proxy_pass http://127.0.0.1:5000/pdf/;
    }
}
